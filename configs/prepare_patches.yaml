# ===== Paths =====
base_path: '/mnt/c/Users/piacal/Code/SuperResolution4DFlowMRI/Temporal4DFlowNet/data/CARDIAC'
lr_file: 'M1_2mm_step2_cs_invivoD.h5'
hr_file: 'M1_2mm_step2_cs_invivoP01.h5'
output_filename: 'patches.csv'    # saved under base_path/csv_files/

# ===== Patch settings =====
spatial_patch_size: 16
temporal_patch_size: 16
n_patch: 10                       # number of patches per slice index
minimum_coverage: 0.2             # minimum fluid coverage [0-1]
n_empty_patch_allowed: 1          # max low-coverage patches per slice
mask_threshold: 0.5

# ===== Augmentation settings =====
# Augmentations are always physics-consistent.
# Available augmentations (defined in PatchData.py):
#   flip_1, flip_2, flip_12, rot90, rot180, rot270
save_nonaugmented_patch: true
n_patches_augmented_from_original_patch: 4   # max is 6 (number of physics-consistent augmentations)
random_w_orientation: false                   # randomly flip sign_w (through-plane component)